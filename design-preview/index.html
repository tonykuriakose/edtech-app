<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Cognify — Adaptive Learning · All Screens</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="tokens.css"/>
<style>
  body { background: #ebe5d3; }
  .streaming-cursor {
    display: inline-block; width: 7px; height: 14px;
    background: var(--accent); vertical-align: middle; margin-left: 2px;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  ol, ul { padding-left: 22px; margin: 8px 0; }
  ol li, ul li { margin: 4px 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens-student.jsx"></script>
<script type="text/babel" src="screens-student-2.jsx"></script>
<script type="text/babel" src="screens-teacher.jsx"></script>
<script type="text/babel" src="screens-admin.jsx"></script>

<script type="text/babel" data-presets="react">
const W = 1440, H = 900;

function App() {
  return (
    <DesignCanvas
      title="Cognify — Adaptive Learning Platform"
      subtitle="14 screens across Student, Teacher, and Admin roles · Warm minimal theme"
    >
      <DCSection id="student" title="Student" subtitle="Learners browse, study, quiz, and chat with an AI tutor">
        <DCArtboard id="s-dashboard" label="01 · Home dashboard" width={W} height={H}><StudentDashboard/></DCArtboard>
        <DCArtboard id="s-catalog" label="02 · Browse catalog" width={W} height={H}><CourseCatalog/></DCArtboard>
        <DCArtboard id="s-course" label="03 · Course detail" width={W} height={H}><CourseDetail/></DCArtboard>
        <DCArtboard id="s-lesson" label="04 · Lesson viewer + Lesson AI" width={W} height={H}><LessonViewer/></DCArtboard>
        <DCArtboard id="s-quiz" label="05 · Quiz in progress" width={W} height={H}><QuizInProgress/></DCArtboard>
        <DCArtboard id="s-results" label="06 · Quiz results & adaptive feedback" width={W} height={H}><QuizResults/></DCArtboard>
        <DCArtboard id="s-progress" label="07 · Progress & analytics" width={W} height={H}><ProgressPage/></DCArtboard>
        <DCArtboard id="s-tutor" label="08 · AI Tutor (streaming chat)" width={W} height={H}><AITutor/></DCArtboard>
      </DCSection>

      <DCSection id="teacher" title="Teacher" subtitle="Create courses with a multi-step wizard, trigger AI quizzes, see analytics">
        <DCArtboard id="t-dashboard" label="09 · Teacher dashboard" width={W} height={H}><TeacherDashboard/></DCArtboard>
        <DCArtboard id="t-wizard" label="10 · Course wizard · lessons step" width={W} height={H}><CourseWizard/></DCArtboard>
        <DCArtboard id="t-analytics" label="11 · Per-course analytics" width={W} height={H}><CourseAnalytics/></DCArtboard>
      </DCSection>

      <DCSection id="admin" title="Admin" subtitle="Approve courses, manage users, monitor platform-wide health">
        <DCArtboard id="a-overview" label="12 · Admin overview" width={W} height={H}><AdminOverview/></DCArtboard>
        <DCArtboard id="a-approvals" label="13 · Course approvals" width={W} height={H}><CourseApprovals/></DCArtboard>
        <DCArtboard id="a-users" label="14 · User management" width={W} height={H}><UserManagement/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
